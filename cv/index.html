<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Paul Muller — CV</title>
  <link rel="stylesheet" href="/assets/css/style.css" />
  <meta name="color-scheme" content="light" />
</head>
<body data-page="cv">
  <header class="topbar">
    <div class="inner">
      <a class="brand" href="/">Paul Muller</a>
      <nav class="nav" aria-label="Primary">
        <a href="/" data-nav="home">Home</a>
        <a href="/research/" data-nav="research">Research</a>
        <a href="/cv/" data-nav="cv">CV</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <p id="loadError" class="callout" hidden>
      Content failed to load. Please check that <span style="font-family:var(--mono)">/data/site.json</span> exists in the repository root.
    </p>

<section class="hero" style="grid-template-columns:1fr;">
  <div>
    <h1>CV</h1>
    <p class="subtitle">Download or view the PDF</p>
    <div class="btnrow">
      <a class="btn" id="cvDownload" href="/assets/cv/CV_Paul_Muller.pdf" target="_blank" rel="noopener">Download CV (PDF)</a>
    </div>
  </div>
</section>

<section class="card">
  <div class="hd">Preview</div>
  <div class="bd">
    <iframe id="cvEmbed" title="CV PDF" src="/assets/cv/CV_Paul_Muller.pdf" style="width:100%; height: 75vh; border:1px solid var(--border); border-radius:10px;"></iframe>
    <p class="notice" style="margin-top:10px;">If the preview does not load on mobile, use the download button above.</p>
  </div>
</section>

    <footer class="footer" id="footer"></footer>
  </main>

  <script src="/assets/js/site.js" defer></script>
</body>
</html>
